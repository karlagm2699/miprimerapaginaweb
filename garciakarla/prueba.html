
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Horizontal</title>
    <style>
        /* Eliminamos los márgenes por defecto y ponemos el menú en horizontal */
        nav {
            background-color: #333; /* Color de fondo */
            padding: 15px;
        }

        nav ul {
            display: flex; /* Esto pone el menú en horizontal */
            list-style: none; /* Elimina los puntos de la lista */
            margin: 0;
            padding: 0;
            justify-content: center; /* Alinea los elementos al centro */
            gap: 30px; /* Espacio entre cada opción del menú */
        }

        nav ul li a {
            text-decoration: none; /* Quita el subrayado de los enlaces */
            color: white; /* Color del texto */
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        /* Efecto cuando pasas el ratón por encima */
        nav ul li a:hover {
            color: #4CAF50;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>

</body>
</html>
